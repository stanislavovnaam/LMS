<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>Мини-ЛМС</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
  <h1>Мини-ЛМС</h1>
<p>База данных: {% if db_ok %}<strong>OK</strong>{% else %}Ошибка{% endif %}</p>
{% if current_user() %}
  <p>Вы вошли как {{ current_user().username }}. <a href="{{ url_for('dashboard') }}">Дашборд</a> · <a href="{{ url_for('logout') }}">Выйти</a></p>
{% else %}
  <p><a href="{{ url_for('login_form') }}">Войти</a></p>
{% endif %}
</body>
</html>
